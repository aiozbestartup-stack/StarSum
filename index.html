<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starsum</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a202c; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #2d3748; padding: 20px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid #4a5568; }
        #purchase-screen { display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #334155; border: none; color: white; border-radius: 8px; box-sizing: border-box; }
        .buy-btn { width: 100%; padding: 15px; background: #63b3ed; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="card" id="star-btn">Stars olish (Нажми сюда)</div>
</div>

<div id="purchase-screen">
    <button onclick="location.reload()">Назад</button>
    <h3>Stars sotib olish</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="number" id="amount" placeholder="Количество (мин 50)" oninput="calc()">
    <div>Сумма: <span id="total">0</span> so'm</div>
    <button class="buy-btn" onclick="alert('Успешно!')">Sotib olish</button>
</div>

<script>
    // Инициализация
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Логика перехода
    document.getElementById('star-btn').addEventListener('click', function() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('purchase-screen').style.display = 'block';
        // Авто-заполнение username
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').value = tg.initDataUnsafe.user.username || "";
        }
    });

    function calc() {
        let val = document.getElementById('amount').value;
        document.getElementById('total').innerText = (val * 210);
    }
</script>
</body>
</html>
