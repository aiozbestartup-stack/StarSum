<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starsum</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #1a202c; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; height: 100vh; }
        .active { display: block; }
        
        /* Меню */
        header { display: flex; justify-content: space-between; padding: 15px; background: #2d3748; }
        .card { background: #2d3748; padding: 20px; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        
        /* Страница покупки */
        .back-btn { font-size: 24px; margin-bottom: 20px; cursor: pointer; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
        .presets { display: flex; gap: 10px; margin: 10px 0; }
        .preset-btn { background: #4a5568; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; }
        .total-box { background: #2d3748; padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 20px; }
        .buy-btn { width: 100%; padding: 15px; background: #63b3ed; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="menu-screen" class="screen active">
    <header><div>STARSUM</div></header>
    <div class="card" onclick="showPurchase()">
        <i class="fa-solid fa-star"></i> <span>Stars olish</span>
    </div>
    </div>

<div id="purchase-screen" class="screen">
    <div class="back-btn" onclick="showMenu()"><i class="fa-solid fa-arrow-left"></i></div>
    <h3>Stars sotib olish</h3>
    <div style="display:flex; gap:10px;">
        <input type="text" id="username" placeholder="Username">
        <button onclick="setMyUsername()" style="background:#63b3ed; border:none; border-radius:8px; padding:0 15px;">O'zimga</button>
    </div>
    <input type="number" id="amount" placeholder="Miqdori (min 50)" oninput="calcTotal()">
    <div class="presets">
        <div class="preset-btn" onclick="selectAmount(50)">50</div>
        <div class="preset-btn" onclick="selectAmount(100)">100</div>
        <div class="preset-btn" onclick="selectAmount(200)">200</div>
        <div class="preset-btn" onclick="selectAmount(500)">500</div>
        <div class="preset-btn" onclick="selectAmount(1000)">1000</div>
    </div>
    <div class="total-box">To'lov summasi: <span id="total-price">0</span> so'm</div>
    <button class="buy-btn" onclick="buyStars()">Sotib olish</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function showPurchase() { document.getElementById('menu-screen').classList.remove('active'); document.getElementById('purchase-screen').classList.add('active'); }
    function showMenu() { document.getElementById('menu-screen').classList.add('active'); document.getElementById('purchase-screen').classList.remove('active'); }
    
    function setMyUsername() { document.getElementById('username').value = tg.initDataUnsafe.user.username || ""; }
    
    function selectAmount(val) { document.getElementById('amount').value = val; calcTotal(); }
    
    function calcTotal() {
        let amt = document.getElementById('amount').value;
        if(amt < 50) amt = 0;
        document.getElementById('total-price').innerText = (amt * 210).toLocaleString();
    }

    function buyStars() {
        let user = document.getElementById('username').value;
        let amt = document.getElementById('amount').value;
        if(amt < 50) return alert("Minimal 50");
        tg.sendData(`Покупка ${amt} звезд для @${user}`);
    }
</script>
</body>
</html>
