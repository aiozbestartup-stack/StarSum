<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starsum Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ОСНОВНЫЕ СТИЛИ */
        body {
            background-color: #1a202c; /* Темный фон как на скрине */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ШАПКА (Лого и Флаги) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #2d3748;
            border-bottom: 1px solid #4a5568;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .flags img {
            width: 25px;
            margin-left: 8px;
            cursor: pointer;
            border-radius: 2px;
        }

        /* КОНТЕНТ (Карточки) */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 80px; /* Отступ для нижнего меню */
        }

        .card {
            background-color: #2d3748;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
            transition: transform 0.1s, border-color 0.2s;
        }

        .card:active {
            transform: scale(0.98);
            border-color: #deff9a;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background-color: #1a202c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #deff9a;
        }

        .card-text {
            font-size: 18px;
            font-weight: 500;
        }

        /* НИЖНЕЕ МЕНЮ (NAVBAR) */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #1a202c;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #4a5568;
        }

        .nav-item {
            text-align: center;
            color: #718096;
            font-size: 12px;
            text-decoration: none;
            flex: 1;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #deff9a;
        }

        /* СТИЛИ ДЛЯ ОТДЕЛЬНЫХ КАРТОЧЕК */
        .stars { border-left: 5px solid #deff9a; }
        .premium { border-left: 5px solid #a855f7; }
        .referral { border-left: 5px solid #3b82f6; }

    </style>
</head>
<body>

    <header>
        <div class="logo">STARSUM</div>
        <div class="flags">
            <img src="https://flagpedia.net/data/flags/mini/us.png" alt="EN" onclick="changeLang('en')">
            <img src="https://flagpedia.net/data/flags/mini/ru.png" alt="RU" onclick="changeLang('ru')">
            <img src="https://flagpedia.net/data/flags/mini/uz.png" alt="UZ" onclick="changeLang('uz')">
        </div>
    </header>

    <main>
        <a href="#" class="card stars" onclick="sendMessage('Stars olish pre-order')">
            <div class="card-icon"><i class="fa-solid fa-star"></i></div>
            <div class="card-text">Stars olish</div>
        </a>

        <a href="#" class="card premium" onclick="sendMessage('Premium status check')">
            <div class="card-icon"><i class="fa-solid fa-crown"></i></div>
            <div class="card-text">Premium olish</div>
        </a>

        <a href="#" class="card referral" onclick="sendMessage('Referral system open')">
            <div class="card-icon"><i class="fa-solid fa-users"></i></div>
            <div class="card-text">Referral orqali daromad</div>
        </a>
    </main>

    <nav>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-star"></i>
            Stars
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Tarix
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-user"></i>
            Men
        </a>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        tg.headerColor = '#2d3748'; // Цвет шапки в Telegram

        function sendMessage(text) {
            tg.sendData(text); // Отправить текст боту при клике
        }

        function changeLang(lang) {
            alert("Язык изменен на: " + lang.toUpperCase());
            // Здесь можно добавить логику смены текста на странице
        }
    </script>
</body>
</html>
